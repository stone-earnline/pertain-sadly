name: eternity
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9015 }
          - { version: 782 }
          - { version: 1737 }
          - { version: 7900 }
          - { version: 2211 }
          - { version: 4393 }
          - { version: 4049 }
          - { version: 6187 }
          - { version: 7951 }
          - { version: 4897 }
          - { version: 2701 }
          - { version: 1248 }
          - { version: 3893 }
          - { version: 5712 }
          - { version: 3711 }
          - { version: 606 }
          - { version: 1105 }
